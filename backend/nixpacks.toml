[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps --include=dev"]

[phases.build]
cmds = ["MEDUSA_ADMIN_DISABLE=true NODE_OPTIONS='--max-old-space-size=4096' npm run build"]

[start]
cmd = "NODE_OPTIONS='--max-old-space-size=640 --max-semi-space-size=32' npm run start"
